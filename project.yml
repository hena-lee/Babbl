name: Babbl
options:
  bundleIdPrefix: com.babbl
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.0.0"

targets:
  Babbl:
    type: application
    platform: macOS
    sources:
      - Babbl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babbl.app
        PRODUCT_NAME: Babbl
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5"
        SWIFT_STRICT_CONCURRENCY: targeted
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: Babbl/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Babbl/Resources/Babbl.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    dependencies:
      - package: WhisperKit
      - package: KeyboardShortcuts
    entitlements:
      path: Babbl/Resources/Babbl.entitlements
      properties:
        com.apple.security.device.audio-input: true

  BabblTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - BabblTests
    dependencies:
      - target: Babbl
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babbl.tests
        SWIFT_VERSION: "5"
        SWIFT_STRICT_CONCURRENCY: targeted
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
